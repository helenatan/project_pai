<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Skills by Domain — Option A</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; background:#faf8f5; font-family:'Inter',system-ui,-apple-system,sans-serif; color:#1c1917; -webkit-text-size-adjust:100%; }
  .wrap { max-width:860px; margin:0 auto; padding:1.5rem 1.15rem 4rem; }
  .banner { font-family:'DM Mono',ui-monospace,monospace; font-size:0.6rem; letter-spacing:.12em; text-transform:uppercase; color:#a06010; font-weight:700; margin-bottom:1rem; }

  .section-header { display:flex; justify-content:space-between; align-items:baseline; padding:0.4rem 0 0.6rem; border-bottom:1px solid #1c1917; gap:0.4rem 1rem; flex-wrap:wrap; }
  .section-title { font-family:'Playfair Display',Georgia,serif; font-size:1.15rem; font-weight:600; }
  .section-meta { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:.07em; text-transform:uppercase; color:#6b6560; }
  .intro { font-family:'Lora',Georgia,serif; font-size:0.83rem; font-style:italic; color:#57534e; line-height:1.6; margin:0.9rem 0 1.5rem; max-width:680px; }

  .a-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.15rem; }
  .a-card { border:1px solid #e6e0d6; border-radius:6px; padding:1.05rem 1.15rem; background:#fff; display:flex; flex-direction:column; }
  .a-top { display:flex; justify-content:space-between; align-items:baseline; gap:0.7rem; }
  .a-name { font-family:'Playfair Display',Georgia,serif; font-size:1rem; font-weight:600; }
  .a-name .new { font-family:'DM Mono',monospace; font-size:0.5rem; font-weight:700; letter-spacing:.08em; color:#fff; background:#a06010; padding:0.12rem 0.3rem; border-radius:2px; vertical-align:middle; margin-left:0.35rem; }
  .a-count { text-align:right; white-space:nowrap; }
  .a-count b { font-family:'DM Mono',monospace; font-size:1.02rem; font-weight:700; color:#a06010; }
  .a-count small { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:.07em; text-transform:uppercase; color:#a89f93; display:block; }
  .a-ability { font-family:'Lora',Georgia,serif; font-size:0.79rem; font-style:italic; color:#6b6560; line-height:1.5; margin:0.5rem 0 0.8rem; }
  .a-quotebox { border-left:2px solid #a06010; padding-left:0.75rem; margin-top:auto; }
  .a-quote { font-family:'Lora',Georgia,serif; font-size:0.82rem; line-height:1.55; color:#3d3830; }
  .a-cite { font-family:'Lora',Georgia,serif; font-size:0.73rem; font-style:italic; color:#a06010; margin-top:0.4rem; }

  @media (max-width:680px) {
    .a-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">Option A · AI Skills by Domain</div>
  <section>
    <div class="section-header">
      <span class="section-title">III. AI Skills by Domain</span>
      <span class="section-meta">8 domains · ranked by demand</span>
    </div>
    <p class="intro">
      How often each AI competency appears in PM job descriptions. A posting can require
      several domains, so counts overlap and aren't expected to sum. Figures are estimated
      across active openings.
    </p>
    <div class="a-grid" id="render"></div>
  </section>
</div>
<script>
const domains = [
  { name:'Model Fluency', count:26400,
    ability:"reason about what AI models can and can't do.",
    quote:'Deep understanding of LLM capabilities and limitations, and the judgment to know when generative AI is the right tool for the job.',
    cite:'OpenAI — Product Manager, Platform' },
  { name:'Agentic Systems', count:24800,
    ability:'design products where AI takes multi-step actions autonomously.',
    quote:'Experience designing agentic workflows where the model plans and executes multi-step tasks with minimal human oversight.',
    cite:'Sierra — Product Manager, Agents' },
  { name:'Applied AI Products', count:16200, isNew:true,
    ability:'take an AI capability from prototype to a shipped product feature.',
    quote:"Track record shipping AI-powered features in a consumer product — you've taken an AI capability from prototype to production.",
    cite:'Notion — Senior Product Manager' },
  { name:'AI Deployment', count:9300,
    ability:'own AI systems in production at scale.',
    quote:'Own AI systems in production — accountable for latency, inference cost, and reliability as we scale to millions of users.',
    cite:'Databricks — Product Manager, AI Platform' },
  { name:'AI Building Blocks', count:4100,
    ability:'understand and spec the technical components that power AI features.',
    quote:'Hands-on familiarity with RAG, embeddings, and prompt design — enough to spec AI features alongside engineering.',
    cite:'Glean — Senior Product Manager' },
  { name:'AI Safety', count:2600,
    ability:'ship AI that is trustworthy, fair, and compliant.',
    quote:'Partner with research to identify model risks and ship guardrails that keep the product trustworthy.',
    cite:'Anthropic — Product Manager, Trust & Safety' },
  { name:'AI Product Vision', count:1500,
    ability:'set long-term AI direction for a product.',
    quote:'Set a multi-year AI roadmap that translates frontier model capabilities into a coherent product strategy.',
    cite:'Google DeepMind — Group Product Manager' },
  { name:'Evals & Quality', count:900,
    ability:"define and measure what 'good' means for an AI feature.",
    quote:'Define eval criteria and build the measurement systems that tell us whether an AI feature is actually good.',
    cite:'Anthropic — Product Manager, Evals' },
];
const fmt = n => '~' + n.toLocaleString();

document.getElementById('render').innerHTML = domains.map(d => `
  <div class="a-card">
    <div class="a-top">
      <span class="a-name">${d.name}${d.isNew ? '<span class="new">New</span>' : ''}</span>
      <span class="a-count"><b>${fmt(d.count)}</b><small>postings</small></span>
    </div>
    <p class="a-ability">The ability to ${d.ability}</p>
    <div class="a-quotebox">
      <div class="a-quote">&ldquo;${d.quote}&rdquo;</div>
      <div class="a-cite">— ${d.cite}</div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
